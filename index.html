<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Buton Paneli</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .btn {
      background: #1e1e1e;
      border: 2px solid #333;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all 0.15s ease;
      user-select: none;
    }

    .btn:active {
      background: #3a7afe;
      border-color: #3a7afe;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div class="btn" onclick="alert('Buton 1 çalıştı')">BUTON 1</div>
  <div class="btn" onclick="alert('Buton 2 çalıştı')">BUTON 2</div>
  <div class="btn" onclick="alert('Buton 3 çalıştı')">BUTON 3</div>

</body>
</html>
