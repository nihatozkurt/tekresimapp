<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banka Giriş Ekranı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay">
        <header>
            <div class="logo">DenizBank</div>
            <button class="lang-btn">ENG</button>
        </header>

        <main class="login-card">
            <div class="tabs">
                <button class="tab active">BİREYSEL</button>
                <button class="tab">KURUMSAL</button>
            </div>

            <form>
                <div class="input-group">
                    <label>T.C. Kimlik No / Kullanıcı Adı</label>
                    <input type="text" placeholder="Kullanıcı Adı/TCKN">
                </div>

                <div class="input-group">
                    <label>Parola</label>
                    <input type="password" placeholder="Parolanızı giriniz">
                </div>

                <div class="input-group">
                    <label>Güvenlik Kodu</label>
                    <input type="text">
                    <div class="captcha-container">
                        <img src="captcha-placeholder.png" alt="Captcha" class="captcha-img">
                        <button type="button" class="refresh-btn">↻</button>
                    </div>
                </div>

                <button type="submit" class="login-btn">GİRİŞ YAP</button>
            </form>

            <div class="footer-buttons">
                <button class="secondary-btn">PAROLAMI UNUTTUM / BLOKE KALDIR</button>
                <button class="secondary-btn">KULLANICI OLUŞTUR</button>
            </div>
        </main>
    </div>
</body>
</html>
