<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DenizBank Mobil</title>
    <style>
        /* GENEL AYARLAR */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; height: 100vh; overflow: hidden; }

        /* --- 1. GİRİŞ EKRANI (İLK GÖRÜNEN) --- */
        #login-page {
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1000&q=80') no-repeat center center;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .login-header { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 40px; }
        .login-header h2 { font-weight: bold; letter-spacing: 1px; }

        .login-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; background: #eee; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; border: none; }
        .tab.active { background: #0067b1; color: white; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }

        .captcha-area { display: flex; gap: 10px; margin-top: 5px; }
        .captcha-img { background: #ddd; flex: 1; height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-style: italic; font-weight: bold; }
        
        .login-btn { 
            width: 100%; padding: 15px; border: none; border-radius: 6px; color: white;
            background: linear-gradient(90deg, #ff0055 0%, #a20055 100%);
            font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px;
        }

        /* --- 2. DASHBOARD EKRANI (GİZLİ) --- */
        #dashboard-page {
            display: none; /* İlk başta gizli */
            background-color: white;
            height: 100vh;
            flex-direction: column;
        }

        .dash-header {
            background-color: #0082f0;
            color: white;
            padding: 15px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            text-align: center;
        }

        .dash-nav { display: flex; justify-content: space-around; margin: 15px 0; font-size: 13px; font-weight: bold; }
        .dash-nav span { padding-bottom: 5px; opacity: 0.8; }
        .dash-nav .active-tab { opacity: 1; border-bottom: 2px solid white; }

        .acc-card {
            background: rgba(255, 255, 255, 0.15);
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .balance-title { font-size: 13px; opacity: 0.9; margin-top: 15px; }
        .balance-amount { font-size: 30px; font-weight: bold; margin: 5px 0; }

        .grid-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-bottom: 10px;
        }
        .action-circle {
            background: rgba(255,255,255,0.2);
            width: 50px; height: 50px; border-radius: 12px;
            margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .action-item span { font-size: 10px; display: block; }

        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px; text-align: center; color: #1a3b5d;
        }
    </style>
</head>
<body>

    <div id="login-page">
        <header class="login-header">
            <h2>DenizBank</h2>
            <div style="border: 1px solid white; padding: 4px 12px; border-radius: 4px; font-size: 12px;">ENG</div>
        </header>

        <main class="login-card">
            <div class="tabs">
                <button class="tab active">BİREYSEL</button>
                <button class="tab">KURUMSAL</button>
            </div>

            <div class="input-group">
                <label>T.C. Kimlik No / Kullanıcı Adı</label>
                <input type="text" placeholder="Kullanıcı Adı/TCKN">
            </div>

            <div class="input-group">
                <label>Parola</label>
                <input type="password" placeholder="Parolanızı giriniz">
            </div>

            <div class="input-group">
                <label>Güvenlik Kodu</label>
                <input type="text">
                <div class="captcha-area">
                    <div class="captcha-img">2 D 2 2</div>
                    <button style="background:none; border:none; font-size:20px; color:#0067b1;">↻</button>
                </div>
            </div>

            <button class="login-btn" onclick="girisYap()">GİRİŞ YAP</button>

            <div style="display:flex; gap:10px; margin-top:15px;">
                <button style="flex:1; font-size:10px; padding:8px; border:1px solid #ccc; background:white; border-radius:4px;">PAROLAMI UNUTTUM</button>
                <button style="flex:1; font-size:10px; padding:8px; border:1px solid #ccc; background:white; border-radius:4px;">KULLANICI OLUŞTUR</button>
            </div>
        </main>
    </div>

    <div id="dashboard-page">
        <header class="dash-header">
            <div style="display:flex; justify-content:space-between; font-size:18px;">
                <span>⬅ DenizBank</span>
                <span>🔔</span>
            </div>

            <div class="dash-nav">
                <span class="active-tab">HESAPLAR</span>
                <span>KARTLAR</span>
                <span>FİNANSAL ÖZET</span>
            </div>

            <div class="acc-card">
                <div>
                    <div style="font-weight:bold; font-size:14px;">Oğuz Kağan Bölükbaşı</div>
                    <div style="font-size:12px; opacity:0.8;">22348864 - 55555 / Silivri</div>
                </div>
                <div>👁</div>
            </div>

            <div class="balance-title">Güncel Bakiye</div>
            <div class="balance-amount">1.005.600,00 TL</div>
            <div style="font-size:12px; margin-bottom:15px;">Bloke Tutarı: 0,00 TL</div>

            <div class="grid-actions">
                <div class="action-item"><div class="action-circle">↑</div><span>Hisse Al</span></div>
                <div class="action-item"><div class="action-circle">↓</div><span>Hisse Sat</span></div>
                <div class="action-item"><div class="action-circle">📝</div><span>Emirlerim</span></div>
                <div class="action-item"><div class="action-circle">📈</div><span>Birikim</span></div>
            </div>
        </header>

        <main class="empty-state">
            <div style="font-size: 60px; margin-bottom: 20px;">🗨️</div>
            <h3>Bu ürüne ait herhangi bir işleminiz bulunmamaktadır.</h3>
        </main>
    </div>

    <script>
        function girisYap() {
            // Giriş sayfasını gizle
            document.getElementById('login-page').style.display = 'none';
            // Dashboard sayfasını göster (flex olarak çünkü içindeki ortalama önemli)
            document.getElementById('dashboard-page').style.display = 'flex';
        }
    </script>
</body>
</html>
