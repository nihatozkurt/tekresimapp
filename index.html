<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DenizBank</title>
	<link rel="apple-touch-icon" href="logo.png">
    <style>
        /* --- GENEL SIFIRLAMA --- */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: #f0f2f5; height: 100vh; overflow: hidden; }

        /* --- GİRİŞ EKRANI --- */
        #login-page {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; height: 100vh; display: flex; flex-direction: column; padding: 20px;
        }
        .login-card { background: rgba(255, 255, 255, 0.94); border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; margin: auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        .login-btn { width: 100%; padding: 16px; border: none; border-radius: 6px; color: white; background: linear-gradient(90deg, #e60050 0%, #9e0050 100%); font-weight: bold; cursor: pointer; }

        /* --- DASHBOARD --- */
        #dashboard-page { display: none; background-color: white; height: 100vh; flex-direction: column; }
        .dash-header { background-color: #0082f0; color: white; padding: 15px 15px 20px 15px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
        .page-title { background: #0082f0; color: white; text-align: center; padding: 15px; font-weight: bold; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .dash-nav { display: flex; justify-content: space-around; margin: 15px 0; }
        .dash-nav span { font-size: 13px; font-weight: bold; opacity: 0.7; cursor: pointer; }
        .dash-nav .active-tab { opacity: 1; border-bottom: 3px solid white; padding-bottom: 5px; }

        /* Liste Tasarımı */
        .list-container { flex: 1; overflow-y: auto; padding-bottom: 85px; background: #fff; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f2f2f2; color: #333; font-size: 15px; cursor: pointer; }
        .list-item .arrow { color: #ccc; font-weight: bold; }
        .tag-new { background: #00b0ff; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 10px; }

        /* Menü Özel: Hızlı İşlemler */
        .fast-actions { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: #f9f9f9; }
        .fast-card { min-width: 120px; background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; font-size: 11px; font-weight: bold; color: #0067b1; }

        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #8e99a3; font-size: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .nav-item.active { color: #0082f0; }
        .menu-center-btn { position: relative; top: -15px; background: linear-gradient(180deg, #ff0055 0%, #a20055 100%); width: 60px; height: 70px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white !important; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-page">
        <main class="login-card">
            <h2 style="text-align:center; color:#0067b1; margin-bottom:20px;">DenizBank</h2>
            <div class="input-group"><label>Kullanıcı Adı</label><input type="text" value="Oğuz Kağan BÖLÜKBAŞI"></div>
            <div class="input-group"><label>Parola</label><input type="password" id="password" placeholder="Parolanızı giriniz"></div>
            <button class="login-btn" onclick="loginCheck()">GİRİŞ YAP</button>
        </main>
    </div>

    <div id="dashboard-page">
        
        <header id="header-main" class="dash-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size: 20px; cursor:pointer;" onclick="logout()">⇦ DenizBank</span>
                <div style="display:flex; gap:15px;"><span>⏸</span><span>🔔</span></div>
            </div>
            <nav class="dash-nav">
                <span id="tab-acc" class="active-tab" onclick="switchMainTab('accounts')">HESAPLAR</span>
                <span id="tab-card" onclick="switchMainTab('cards')">KARTLAR</span>
                <span id="tab-sum" onclick="switchMainTab('summary')">FİNANSAL ÖZET</span>
            </nav>
            <div id="info-box"></div>
        </header>

        <div id="header-generic" class="page-title hidden">
            <span id="page-title-text">BAŞLIK</span>
            <span style="float:right;">⏸</span>
        </div>

        <main class="list-container" id="main-content"></main>

        <nav class="bottom-nav">
            <div id="n-home" class="nav-item active" onclick="showView('home')"><span>🏠</span><span>Ana Sayfa</span></div>
            <div id="n-apply" class="nav-item" onclick="showView('apply')"><span>📋</span><span>Başvurular</span></div>
            <div id="n-menu" class="nav-item menu-center-btn" onclick="showView('menu')"><span>☸</span><span>MENÜ</span></div>
            <div id="n-send" class="nav-item" onclick="showView('send')"><span>💸</span><span>Para Gönder</span></div>
            <div id="n-pay" class="nav-item" onclick="showView('pay')"><span>💳</span><span>Ödeme Yap</span></div>
        </nav>
    </div>

    <script>
        function loginCheck() {
            if (document.getElementById('password').value === "7654321") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard-page').style.display = 'flex';
                showView('home');
            } else { alert("Hatalı parola!"); }
        }

        function logout() {
            document.getElementById('dashboard-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('password').value = "";
        }

        function showView(view) {
            const content = document.getElementById('main-content');
            const headerMain = document.getElementById('header-main');
            const headerGen = document.getElementById('header-generic');
            const titleText = document.getElementById('page-title-text');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            headerMain.classList.add('hidden');
            headerGen.classList.remove('hidden');

            if(view === 'home') {
                document.getElementById('n-home').classList.add('active');
                headerMain.classList.remove('hidden');
                headerGen.classList.add('hidden');
                switchMainTab('accounts');
            } else {
                document.getElementById('n-' + view).classList.add('active');
                titleText.innerText = view === 'send' ? "PARA GÖNDER" : view === 'pay' ? "ÖDEME YAP" : view === 'apply' ? "BAŞVURULAR" : "MENÜ";
                
                if(view === 'send') {
                    content.innerHTML = `<div class="list-item">Kayıtlı İşlemler<span>❯</span></div><div class="list-item">Son 50 İşlem<span>❯</span></div><div class="list-item">Başka Hesaba<span>❯</span></div><div class="list-item">Kolay Adrese<span>❯</span></div><div class="list-item">FAST İşlemleri <span class="tag-new">fast</span><span>❯</span></div>`;
                } else if(view === 'pay') {
                    content.innerHTML = `<div class="list-item">Kayıtlı Faturalar<span>❯</span></div><div class="list-item">Fatura<span>❯</span></div><div class="list-item">Kart Borcu<span>❯</span></div><div class="list-item">Ulaşım Kart <span style="color:green">🌱</span><span>❯</span></div>`;
                } else if(view === 'menu') {
                    content.innerHTML = `<div class="fast-actions"><div class="fast-card">📋<br>Başka Hesaba<br>Para Gönder</div><div class="fast-card">📄<br>Fatura<br>Ödeme</div><div class="fast-card">⚡<br>Kolay Adres<br>İşlemleri</div></div><div class="list-item">Hesaplar<span>❯</span></div><div class="list-item">Kartlar<span>❯</span></div><div class="list-item">Krediler<span>❯</span></div><div class="list-item">Yatırım İşlemleri<span>❯</span></div>`;
                } else {
                    content.innerHTML = `<div class="list-item">Hesap Açılışı<span>❯</span></div><div class="list-item">Kredi Başvurusu<span>❯</span></div><div class="list-item">Kart Başvurusu<span>❯</span></div>`;
                }
            }
        }

        function switchMainTab(tab) {
            const info = document.getElementById('info-box');
            const content = document.getElementById('main-content');
            document.getElementById('tab-acc').classList.remove('active-tab');
            document.getElementById('tab-card').classList.remove('active-tab');
            if(document.getElementById('tab-sum')) document.getElementById('tab-sum').classList.remove('active-tab');

            if(tab === 'accounts') {
                document.getElementById('tab-acc').classList.add('active-tab');
                info.innerHTML = `<div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:10px;"><b>Oğuz Kağan Bölükbaşı</b><br><small>22348864 - Silivri</small></div><h1 style="text-align:center; margin:15px 0;">1.005.600,00 TL</h1>`;
                content.innerHTML = `
                    <div style="background:#f0f7ff; margin:15px; padding:15px; border-radius:12px; border:1px solid #d0e5ff;">
                        <h4 style="color:#0067b1; font-size:13px; margin-bottom:5px;">Aylık Mevduat Getirisi</h4>
                        <p style="font-size:11px; color:#666;">Mevcut bakiyenizin net getirisi:</p>
                        <div style="font-size:20px; font-weight:bold; color:#2e7d32;">+29.000,00 TL</div>
                    </div>
                    <div style="text-align:center; padding:30px; color:#999;">💬<br>İşleminiz bulunmamaktadır.</div>`;
            } else if(tab === 'cards') {
                document.getElementById('tab-card').classList.add('active-tab');
                info.innerHTML = `<div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:10px;"><b>DenizBank Gold MasterCard</b><br><small>5556 60** **** 6190</small></div><h1 style="text-align:center; margin:15px 0; color:#ffeb3b;">-50.000,00 TL</h1>`;
                content.innerHTML = `<div style="text-align:center; padding:50px; color:#999;">⏸<br>Dönemiçi işleminiz bulunmamaktadır.</div>`;
            } else if(tab === 'summary') {
                document.getElementById('tab-sum').classList.add('active-tab');
                info.innerHTML = `<div style="padding:10px; margin-top:10px;"><h2 style="text-align:center;">Finansal Özet</h2></div>`;
                content.innerHTML = `
                    <div style="padding:20px;">
                        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px dotted #ccc;"><span>Toplam Varlık</span><span style="color:#2e7d32; font-weight:bold;">1.005.600,00 TL</span></div>
                        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px dotted #ccc;"><span>Toplam Borç</span><span style="color:#e60050; font-weight:bold;">-50.000,00 TL</span></div>
                        <div style="display:flex; justify-content:space-between; padding:15px 0; margin-top:10px; border-top:2px solid #0082f0;">
                            <span style="font-weight:bold;">Net Varlık</span>
                            <span style="font-weight:bold; font-size:18px;">955.600,00 TL</span>
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
